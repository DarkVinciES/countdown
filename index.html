<!DOCTYPE html>
<html>
<head>
    <title>Pera Efac Countdowns</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0f12;
            --panel: #13171d;
            --border: #1e252f;
            --green: #00e676;
            --green-dim: #00e67622;
            --amber: #ffab00;
            --amber-dim: #ffab0022;
            --text: #e8edf3;
            --muted: #4a5568;
            --mono: 'Share Tech Mono', monospace;
            --sans: 'Barlow', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            gap: 0;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 40% at 20% 20%, #00e67608 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 80% 80%, #ffab0008 0%, transparent 60%);
            pointer-events: none;
        }

        .timer-block {
            width: 100%;
            max-width: 640px;
            padding: 40px 48px;
            background: var(--panel);
            border: 1px solid var(--border);
            position: relative;
        }

        .timer-block:first-child {
            border-radius: 12px 12px 0 0;
            border-bottom: none;
        }

        .timer-block:last-child {
            border-radius: 0 0 12px 12px;
        }

        .label {
            font-family: var(--sans);
            font-weight: 300;
            font-size: 0.7rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 18px;
        }

        .countdown {
            font-family: var(--mono);
            font-size: clamp(2rem, 8vw, 3.2rem);
            letter-spacing: 0.04em;
            margin-bottom: 28px;
            transition: color 0.3s;
        }

        .timer-block.green .countdown { color: var(--green); }
        .timer-block.amber .countdown { color: var(--amber); }

        /* Progress bar */
        .progress-wrap {
            width: 100%;
        }

        .progress-meta {
            display: flex;
            justify-content: space-between;
            font-family: var(--mono);
            font-size: 0.65rem;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .progress-track {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 999px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            border-radius: 999px;
            transition: width 0.9s linear;
            position: relative;
        }

        .timer-block.green .progress-fill {
            background: linear-gradient(90deg, #00c853, var(--green));
            box-shadow: 0 0 12px var(--green);
        }

        .timer-block.amber .progress-fill {
            background: linear-gradient(90deg, #ff6f00, var(--amber));
            box-shadow: 0 0 12px var(--amber);
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .timer-block.green .progress-fill::after {
            background: var(--green);
            box-shadow: 0 0 8px var(--green);
        }

        .timer-block.amber .progress-fill::after {
            background: var(--amber);
            box-shadow: 0 0 8px var(--amber);
        }

        /* Divider */
        .divider {
            width: 100%;
            max-width: 640px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--muted), transparent);
            position: relative;
            z-index: 2;
        }

        .divider-label {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 4px 14px;
            font-family: var(--mono);
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            color: var(--muted);
            text-transform: uppercase;
            border-radius: 999px;
        }

        /* Pulse dot */
        .pulse-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
            position: relative;
            top: -1px;
            animation: pulse 1.4s ease-in-out infinite;
        }

        .timer-block.green .pulse-dot { background: var(--green); }
        .timer-block.amber .pulse-dot { background: var(--amber); }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.7); }
        }

        /* Corner tag */
        .corner-tag {
            position: absolute;
            top: 16px;
            right: 20px;
            font-family: var(--mono);
            font-size: 0.6rem;
            letter-spacing: 0.15em;
            color: var(--muted);
        }

        @media (max-width: 500px) {
            .timer-block { padding: 28px 24px; }
        }
    </style>
</head>
<body>

    <!-- Timer 1: Project Launch -->
    <div class="timer-block green">
        <span class="corner-tag">E21</span>
        <div class="label"><span class="pulse-dot"></span>Academic Year Ends in...</div>
        <div class="countdown" id="timer1">--d --h --m --s</div>
        <div class="progress-wrap">
            <div class="progress-meta">
                <span id="pct1">0%</span>
                <span id="remaining1">calculating...</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="bar1" style="width:0%"></div>
            </div>
        </div>
    </div>

    <!-- Divider -->
    <div class="divider">
        <span class="divider-label">// Current Batches</span>
    </div>

    <!-- Timer 2: New Year -->
    <div class="timer-block amber">
        <span class="corner-tag">Final Year</span>
        <div class="label"><span class="pulse-dot"></span>Degree complete in</div>
        <div class="countdown" id="timer2">--d --h --m --s</div>
        <div class="progress-wrap">
            <div class="progress-meta">
                <span id="pct2">0%</span>
                <span id="remaining2">calculating...</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="bar2" style="width:0%"></div>
            </div>
        </div>
    </div>

    <script>
        // ── Timer 1: Project Launch — Jan 1 2027
        const target1   = new Date("Oct 17, 2026 00:00:00").getTime();
        const start1    = new Date("Nov 24, 2025 00:00:00").getTime(); // arbitrary start
        const totalSpan1 = target1 - start1;

        // ── Timer 2: Product Beta — Jun 15 2026
        const target2   = new Date("Oct 17, 2026 00:00:00").getTime();
        const start2    = new Date("Mar 12, 2022 00:00:00").getTime();
        const totalSpan2 = target2 - start2;

        function fmt(distance) {
            if (distance < 0) return null;
            const days    = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours   = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            return `${String(days).padStart(2,'0')}d ${String(hours).padStart(2,'0')}h ${String(minutes).padStart(2,'0')}m ${String(seconds).padStart(2,'0')}s`;
        }

        function shortRemaining(distance) {
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            if (days > 1) return `${days} days left`;
            const hours = Math.floor(distance / (1000 * 60 * 60));
            if (hours > 1) return `${hours} hours left`;
            const mins = Math.floor(distance / (1000 * 60));
            return `${mins} minutes left`;
        }

        function tick() {
            const now = Date.now();

            // Timer 1
            const d1 = target1 - now;
            const elapsed1 = now - start1;
            const pct1 = Math.min(100, Math.max(0, (elapsed1 / totalSpan1) * 100));

            if (d1 < 0) {
                document.getElementById('timer1').textContent = 'LAUNCHED';
                document.getElementById('bar1').style.width = '100%';
                document.getElementById('pct1').textContent = '100%';
                document.getElementById('remaining1').textContent = 'complete';
            } else {
                document.getElementById('timer1').textContent = fmt(d1);
                document.getElementById('bar1').style.width = pct1.toFixed(2) + '%';
                document.getElementById('pct1').textContent = pct1.toFixed(1) + '%';
                document.getElementById('remaining1').textContent = shortRemaining(d1);
            }

            // Timer 2
            const d2 = target2 - now;
            const elapsed2 = now - start2;
            const pct2 = Math.min(100, Math.max(0, (elapsed2 / totalSpan2) * 100));

            if (d2 < 0) {
                document.getElementById('timer2').textContent = 'LAUNCHED';
                document.getElementById('bar2').style.width = '100%';
                document.getElementById('pct2').textContent = '100%';
                document.getElementById('remaining2').textContent = 'complete';
            } else {
                document.getElementById('timer2').textContent = fmt(d2);
                document.getElementById('bar2').style.width = pct2.toFixed(2) + '%';
                document.getElementById('pct2').textContent = pct2.toFixed(1) + '%';
                document.getElementById('remaining2').textContent = shortRemaining(d2);
            }
        }

        tick();
        setInterval(tick, 1000);
    </script>
</body>
</html>
