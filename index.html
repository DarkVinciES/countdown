<!DOCTYPE html>
<html>
<head>
    <title>Batch Countdowns</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0f12;
            --panel: #13171d;
            --border: #1e252f;
            --text: #e8edf3;
            --muted: #4a5568;
            --mono: 'Share Tech Mono', monospace;
            --sans: 'Barlow', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 40% at 20% 20%, #00e67606 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 80% 80%, #ffab0006 0%, transparent 60%);
            pointer-events: none;
        }
        .stack {
            width: 100%;
            max-width: 680px;
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        .timer-block {
            padding: 36px 48px;
            background: var(--panel);
            position: relative;
            border-bottom: 1px solid var(--border);
        }
        .timer-block:last-child { border-bottom: none; }
        .divider {
            display: flex;
            align-items: center;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            padding: 0 48px;
            height: 36px;
            gap: 12px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .divider span {
            font-family: var(--mono);
            font-size: 0.58rem;
            letter-spacing: 0.2em;
            color: var(--muted);
            border: 1px solid var(--border);
            padding: 3px 12px;
            border-radius: 999px;
            white-space: nowrap;
        }
        .corner-tag {
            position: absolute;
            top: 14px;
            right: 20px;
            font-family: var(--mono);
            font-size: 0.6rem;
            letter-spacing: 0.12em;
            color: var(--muted);
        }
        .label {
            font-family: var(--sans);
            font-weight: 300;
            font-size: 0.68rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: #ffffff;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .pulse-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
            animation: pulse 1.4s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.35; transform: scale(0.65); }
        }
        .countdown {
            font-family: var(--mono);
            font-size: clamp(1.8rem, 7vw, 3rem);
            letter-spacing: 0.04em;
            margin-bottom: 24px;
        }
        .progress-wrap { width: 100%; }
        .progress-meta {
            display: flex;
            justify-content: space-between;
            font-family: var(--mono);
            font-size: 0.65rem;
            color: var(--muted);
            margin-bottom: 7px;
        }
        .progress-track {
            width: 100%;
            height: 5px;
            background: var(--border);
            border-radius: 999px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 999px;
            transition: width 0.9s linear;
        }
        @media (max-width: 520px) {
            .timer-block { padding: 28px 22px; }
            .divider { padding: 0 22px; }
        }
    </style>
</head>
<body>
<div class="stack" id="stack"></div>

<script>
/* ════════════════════════════════════════════════════════════════════
   ★  TIMER CONFIG  —  Add, remove, or edit entries here.
   ════════════════════════════════════════════════════════════════════

   Each entry needs:
     title      – label shown above the timer
     tag        – small corner label (e.g. batch name or ID)
     start      – when the period began  (used for progress bar %)
     end        – the deadline you're counting down to
     color      – any CSS color for the digits + bar glow
     divider    – text shown in a separator BEFORE this timer
                  set to "" to show no divider above it

   DATE FORMAT: "Month Day, Year HH:MM:SS"
   e.g.  "Sep 1, 2025 08:00:00"
   ════════════════════════════════════════════════════════════════════ */

const TIMERS = [
    {
        title:   "Current Academic Year Ends In",
        tag:     "CNTDN 01",
        start:   "Nov 24, 2025 08:00:00",
        end:     "Oct 16, 2026 17:00:00",
        color:   "#00e676",
        divider: ""
    },
    {
        title:   "E20 Graduation In",
        tag:     "Final Year",
        start:   "Mar 23, 2022 08:00:00",
        end:     "Oct 16, 2026 17:00:00",
        color:   "#ffab00",
        divider: "// CURRENT BATCHES"
    },
    {
        title:   "E21 Graduation In",
        tag:     "3rd Year",
        start:   "Mar 23, 2023 08:00:00",
        end:     "Oct 16, 2027 17:00:00",
        color:   "#40c4ff",
        divider: ""
    },
    {
        title:   "E22 Graduation In",
        tag:     "2nd Year",
        start:   "Mar 23, 2024 08:00:00",
        end:     "Oct 16, 2028 09:00:00",
        color:   "#ea80fc",
        divider: ""
    },
    {
        title:   "E23 Graduation In",
        tag:     "2nd Year",
        start:   "Aug 23, 2024 08:00:00",
        end:     "Oct 16, 2029 12:00:00",
        color:   "#ff6e6e",
        divider: ""
    },
];

/* ════════════════════════════════════════════════════════════════════
   ★  END OF CONFIG  —  No need to edit anything below this line
   ════════════════════════════════════════════════════════════════════ */

function buildUI() {
    const stack = document.getElementById('stack');
    TIMERS.forEach((t, i) => {
        if (t.divider) {
            const div = document.createElement('div');
            div.className = 'divider';
            div.innerHTML = `<span>${t.divider}</span>`;
            stack.appendChild(div);
        }
        const block = document.createElement('div');
        block.className = 'timer-block';
        block.innerHTML = `
            <span class="corner-tag">${t.tag}</span>
            <div class="label">
                <span class="pulse-dot" style="background:${t.color}"></span>
                ${t.title}
            </div>
            <div class="countdown" id="cd${i}" style="color:${t.color}">--d --h --m --s</div>
            <div class="progress-wrap">
                <div class="progress-meta">
                    <span id="pct${i}">0%</span>
                    <span id="rem${i}">calculating...</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" id="bar${i}"
                         style="background:linear-gradient(90deg,${t.color}99,${t.color});
                                box-shadow:0 0 10px ${t.color}88;
                                width:0%">
                    </div>
                </div>
            </div>`;
        stack.appendChild(block);
    });
}

function fmt(ms) {
    if (ms < 0) return null;
    const d = Math.floor(ms / 86400000);
    const h = Math.floor((ms % 86400000) / 3600000);
    const m = Math.floor((ms % 3600000) / 60000);
    const s = Math.floor((ms % 60000) / 1000);
    return `${String(d).padStart(2,'0')}d ${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
}

function shortLeft(ms) {
    const d = Math.floor(ms / 86400000);
    if (d > 1)  return `${d} days left`;
    const h = Math.floor(ms / 3600000);
    if (h > 1)  return `${h} hours left`;
    return `${Math.floor(ms / 60000)} minutes left`;
}

function tick() {
    const now = Date.now();
    TIMERS.forEach((t, i) => {
        const end   = new Date(t.end).getTime();
        const start = new Date(t.start).getTime();
        const dist  = end - now;
        const pct   = Math.min(100, Math.max(0, (now - start) / (end - start) * 100));

        if (dist < 0) {
            document.getElementById(`cd${i}`).textContent  = 'COMPLETE';
            document.getElementById(`bar${i}`).style.width = '100%';
            document.getElementById(`pct${i}`).textContent = '100%';
            document.getElementById(`rem${i}`).textContent = 'finished';
        } else {
            document.getElementById(`cd${i}`).textContent  = fmt(dist);
            document.getElementById(`bar${i}`).style.width = pct.toFixed(2) + '%';
            document.getElementById(`pct${i}`).textContent = pct.toFixed(1) + '%';
            document.getElementById(`rem${i}`).textContent = shortLeft(dist);
        }
    });
}

buildUI();
tick();
setInterval(tick, 1000);
</script>
</body>
</html>
