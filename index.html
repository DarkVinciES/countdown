<!DOCTYPE html>
<html>
<head>
    <title>My Countdown Site</title>
    <style>
        body { text-align: center; font-family: sans-serif; padding-top: 50px; }
        #timer { font-size: 3rem; font-weight: bold; color: #24292e; }
    </style>
</head>
<body>

    <h1>Project Launch In:</h1>
    <div id="timer">Loading...</div>

    <script>
        // Set the date we're counting down to
        const countDownDate = new Date("Jan 1, 2027 00:00:00").getTime();

        // Update the count down every 1 second
        const x = setInterval(function() {
            const now = new Date().getTime();
            const distance = countDownDate - now;

            // Time calculations for days, hours, minutes and seconds
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Display the result in the element with id="timer"
            document.getElementById("timer").innerHTML = days + "d " + hours + "h "
            + minutes + "m " + seconds + "s ";

            // If the count down is finished, write some text
            if (distance < 0) {
                clearInterval(x);
                document.getElementById("timer").innerHTML = "EXPIRED";
            }
        }, 1000);
    </script>

</body>
</html>
